<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบราคากลาง | Price Reference Management</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0; padding: 0;
      font-family: 'Sarabun', sans-serif;
      background: #F0F4F8;
      color: #1E293B;
    }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

    @keyframes slideUp {
      from { transform: translateY(16px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    input:focus, textarea:focus, select:focus {
      outline: 2px solid #1B3A6B;
      outline-offset: 1px;
      border-color: #1B3A6B !important;
    }

    button:active { transform: scale(0.97); }

    /* ── Print styles ── */
    @media print {
      /* Hide sidebar, header, modals, toast */
      .no-print,
      #root > div > div:first-child,
      #root > div > div > div:first-child { display: none !important; }

      body { background: white; }

      /* Show content full-width */
      #root > div > div:last-child { margin-left: 0 !important; }
      #root > div > div:last-child > main { margin-top: 0 !important; }

      /* Print header */
      @page { margin: 20mm; }

      table { page-break-inside: auto; }
      tr    { page-break-inside: avoid; }
    }
  </style>

  <!-- SheetJS for Excel export -->
  <script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <!-- React 18 + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- 1. Data (plain JS, no Babel needed) -->
  <script src="src/data.js"></script>

  <!-- 2. Components (JSX via Babel) — load in dependency order -->
  <script type="text/babel" src="src/components/Login.jsx"></script>
  <script type="text/babel" src="src/components/Layout.jsx"></script>
  <script type="text/babel" src="src/components/Dashboard.jsx"></script>
  <script type="text/babel" src="src/components/ProductList.jsx"></script>
  <script type="text/babel" src="src/components/ProductDetail.jsx"></script>
  <script type="text/babel" src="src/components/ProductForm.jsx"></script>
  <script type="text/babel" src="src/components/CategoryManager.jsx"></script>
  <script type="text/babel" src="src/components/VendorCompare.jsx"></script>
  <script type="text/babel" src="src/components/SpecManager.jsx"></script>
  <script type="text/babel" src="src/components/CompareView.jsx"></script>

  <!-- 3. App (renders last, depends on all components above) -->
  <script type="text/babel" src="src/App.jsx"></script>
</body>
</html>
